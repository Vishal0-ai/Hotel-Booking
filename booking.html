<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Room Availability Check</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background:  url(image.png) center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Overlay for dim background */
        .overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.45);
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.15);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(12px);
            box-shadow: 0 6px 25px rgba(0,0,0,0.3);
            color: #fff;
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        label {
            font-size: 15px;
            font-weight: 500;
        }

        .input-box {
            width: 100%;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background: rgba(255,255,255,0.85);
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 0 2px #ffffffb3;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ffcc00;
            border: none;
            color: #000;
            font-size: 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background: #ffdb4d;
            transform: translateY(-2px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 20px;
            }
            h2 {
                font-size: 20px;
            }
        }

    </style>
</head>
<body>

    <div class="container">
    <h2>Book Room</h2>

    <form id="bookingForm">
        <div class="input-box">
            <label>Full Name</label>
            <input type="text" id="fullName" placeholder="Enter your full name" required>
        </div>

        <div class="input-box">
            <label>Email</label>
            <input type="email" id="email" placeholder="Enter your email" required>
        </div>

        <div class="input-box">
            <label>Phone Number</label>
            <input type="text" id="phone" placeholder="Enter phone number" required>
        </div>

        <div class="input-box">
            <label>Check-in Date</label>
            <input type="date" id="checkIn" required>
        </div>

        <div class="input-box">
            <label>Check-out Date</label>
            <input type="date" id="checkOut" required>
        </div>

        <div class="input-box">
            <label>Room Type</label>
            <select id="roomType" required>
                <option value="">Select Room Type</option>
                <option>Deluxe Suite</option>
                <option>Family Suite</option>
                <option>Luxury Penthouse</option>
            </select>
        </div>

        <div class="input-box">
            <label>No. of Guests</label>
            <input type="number" id="guests" min="1" placeholder="Enter number of guests" required>
        </div>

        <button type="submit">Book Now</button>
        <p id="bookingMessage" style="margin-top:10px;"></p>
    </form>
</div>

    <script src="booking.js"></script>

</body>
</html>
